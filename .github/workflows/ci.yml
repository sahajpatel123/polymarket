name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Static type checking (mypy) — informational (pre-existing issues)
        run: uv run mypy src/polymaker || echo "mypy_exit=$?"

      - name: Lint check (ruff)
        run: uv run ruff check src/polymaker tests

      - name: Run full unit test suite with coverage
        run: uv run pytest -q --cov=polymaker --cov-fail-under=70

      - name: Dependency audit
        run: uv run python scripts/deps_audit.py --fail-on-flags
